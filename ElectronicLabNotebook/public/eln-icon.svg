<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#0B3C5D"/>

  <!-- Open Notebook -->
  <!-- Left page -->
  <path d="M10 16 Q20 12 30 16 V48 Q20 44 10 48 Z" 
        fill="none" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Right page (trimmed for NN space) -->
  <path d="M54 16 Q44 12 34 16 V36 Q44 32 54 36 Z" 
        fill="none" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Center fold -->
  <line x1="32" y1="16" x2="32" y2="48" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Page lines (left) -->
  <line x1="14" y1="24" x2="28" y2="24" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="14" y1="30" x2="28" y2="30" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="14" y1="36" x2="28" y2="36" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Page lines (right upper only) -->
  <line x1="36" y1="24" x2="50" y2="24" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="36" y1="30" x2="50" y2="30" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Neural Network (2-3-3-2, structured & lower) -->
  <g stroke="#FFFFFF" stroke-width="0.7" fill="#FFFFFF">

    <!-- Node positions -->
    <!-- Layer 1 -->
    <circle cx="40" cy="44" r="1"/>
    <circle cx="40" cy="50" r="1"/>

    <!-- Layer 2 -->
    <circle cx="46" cy="40" r="1"/>
    <circle cx="46" cy="44" r="1"/>
    <circle cx="46" cy="48" r="1"/>

    <!-- Layer 3 -->
    <circle cx="52" cy="40" r="1"/>
    <circle cx="52" cy="44" r="1"/>
    <circle cx="52" cy="48" r="1"/>

    <!-- Layer 4 (angled ~45° from center) -->
    <circle cx="58" cy="42" r="1"/>
    <circle cx="58" cy="50" r="1"/>

    <!-- Connections -->
    <!-- L1 → L2 -->
    <line x1="40" y1="44" x2="46" y2="40"/>
    <line x1="40" y1="44" x2="46" y2="44"/>
    <line x1="40" y1="44" x2="46" y2="48"/>

    <line x1="40" y1="50" x2="46" y2="40"/>
    <line x1="40" y1="50" x2="46" y2="44"/>
    <line x1="40" y1="50" x2="46" y2="48"/>

    <!-- L2 → L3 -->
    <line x1="46" y1="40" x2="52" y2="40"/>
    <line x1="46" y1="40" x2="52" y2="44"/>
    <line x1="46" y1="40" x2="52" y2="48"/>

    <line x1="46" y1="44" x2="52" y2="40"/>
    <line x1="46" y1="44" x2="52" y2="44"/>
    <line x1="46" y1="44" x2="52" y2="48"/>

    <line x1="46" y1="48" x2="52" y2="40"/>
    <line x1="46" y1="48" x2="52" y2="44"/>
    <line x1="46" y1="48" x2="52" y2="48"/>

    <!-- L3 → L4 -->
    <line x1="52" y1="40" x2="58" y2="42"/>
    <line x1="52" y1="40" x2="58" y2="50"/>

    <line x1="52" y1="44" x2="58" y2="42"/>
    <line x1="52" y1="44" x2="58" y2="50"/>

    <line x1="52" y1="48" x2="58" y2="42"/>
    <line x1="52" y1="48" x2="58" y2="50"/>

  </g>
</svg>